name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump all workspace versions
        id: bump
        run: |
          pnpm version:all "${{ github.event.inputs.release_type }}"
          NEXT_VERSION="$(node -p "require('./package.json').version")"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        run: |
          git add package.json packages/*/package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.next_version }}"
          git tag "v${{ steps.bump.outputs.next_version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.next_version }}"

      - name: Publish packages to npm
        run: pnpm -r --filter "./packages/*" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
